# Change these first
owner: brick-io # Your GitHub organization or username, where this repository lives
repo: brick-status-service # The name of this repository

sites:
  # PRODUCTION 
  - name: Disbursement Production
    url: https://api.onebrick.io/v2/payments/gs/disbursements/health
  - name: Acceptance Production
    url: https://api.onebrick.io/v2/payments/acceptance/health
  - name: Authentication Production
    url: https://api.onebrick.io/v3/payments/sc/health

  # OTHERS
  - name: Client Dashboard
    url: https://app.onebrick.io
  - name: Temporary Service
    url: https://api.onebrick.test/v1/temporary

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  # cname: demo.upptime.js.org
  baseUrl: /brick-status-service
  logoUrl: https://www.onebrick.io/images/logo-square.png
  name: Brick Status Page
  introTitle: "**Onebrick.io** status page"
  introMessage: Monitor all Brick services status activity.
  navbar:
    - title: Homepage
      href: https://www.onebrick.io/
    - title: Dashboard
      href: https://app.onebrick.io/

i18n:
  footer: Brick, Preferred Open Finance Ecosystem in Southeast Asia

workflowSchedule:
  graphs: "0 */2 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"
  uptime: "*/5 * * * *"

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
